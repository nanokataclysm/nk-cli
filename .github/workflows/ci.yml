name: ci

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e '.[dev]'
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: CLI smoke
        run: |
          nk-cli --help
          nk-cli portal-doctor --manifest examples/portal-hosts.example.json
          nk-cli reclaim --root . --depth 2 --json | head -c 200
      - name: Stdlib-only guard
        run: |
          python - <<'PY'
          import ast, sys
          from pathlib import Path
          bad = []
          for p in Path("src").rglob("*.py"):
              tree = ast.parse(p.read_text())
              for node in ast.walk(tree):
                  mods = []
                  if isinstance(node, ast.Import):
                      mods = [a.name.split(".")[0] for a in node.names]
                  elif isinstance(node, ast.ImportFrom) and node.module:
                      mods = [node.module.split(".")[0]]
                  for m in mods:
                      if m in {"nk_cli", "__future__"}:
                          continue
                      if m not in sys.stdlib_module_names:
                          bad.append(f"{p}:{m}")
          if bad:
              raise SystemExit("non-stdlib imports: " + ", ".join(bad))
          print("stdlib_only ok")
          PY
      - name: Forbidden string scan
        run: |
          # Fail if private host-control surfaces sneak into src/
          if grep -REn 'nanokat-secrets|crystal_castle|ALLEY_|KAI_BRIDGE|cryptsetup|nanokat-priv|vercel deploy|force-push' src/; then
            echo "forbidden private-control markers in src/" >&2
            exit 1
          fi
          echo "forbidden-string scan ok"
